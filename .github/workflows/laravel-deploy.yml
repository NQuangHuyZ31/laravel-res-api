name: Laravel CI/CD Deploy

on:
push:
branches:
- main

jobs:

test:
name: Run Laravel Tests
runs-on: ubuntu-latest

  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.3
        extensions: mbstring, pdo, pdo_mysql
        tools: composer

    - name: Install dependencies
      run: composer install --no-interaction --prefer-dist

    - name: Prepare environment
      run: |
        cp .env.example .env
        php artisan key:generate

    # - name: Run Pest Tests
    #   run: ./vendor/bin/pest

deploy:
name: Deploy to Hostinger
needs: test
runs-on: ubuntu-latest

  steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOSTINGER_HOST }}
        username: ${{ secrets.HOSTINGER_USER }}
        key: ${{ secrets.HOSTINGER_SSH_KEY }}
        port: 65002
        script: |

          set -e

          cd /home/u684619093/domains/flyway.shoplands.store/public_html

          echo "Pull latest code"
          git pull origin main

          echo "Install composer dependencies"
          composer install --no-dev --optimize-autoloader --ignore-platform-req=php

          echo "Create env if not exists"
          if [ ! -f .env ]; then
            cp .env.example .env
            php artisan key:generate
          fi

          echo "Run database migration"
          php artisan migrate --force

          echo "Clear old cache"
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear

          echo "Rebuild cache"
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

          echo "Restart queue if exists"
          php artisan queue:restart || true

          echo "Deployment completed"
